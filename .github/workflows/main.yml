name: MATLAB Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: matlab-actions/setup-matlab@v2.3.1
        with:
          products: >
            Instrument_Control_Toolbox
      - uses: matlab-actions/run-tests@v2
        with:
          select-by-folder: tests/Solver
          test-results-junit: results/results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: results/results.xml
